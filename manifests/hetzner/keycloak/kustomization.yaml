---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: keycloak

images:
- name: quay.io/keycloak/keycloak
  newTag: "26.6.3"
- name: postgres
  newTag: "18.3"

resources:
# Dependencies: infra
- gateway.yaml
- httproute-http.yaml
- httproute-https.yaml
- certificate.yaml
# Dependencies: postgres
- configmap-postgres.yaml
- statefulset-postgres.yaml
- service-postgres.yaml
# Main deployment
- configmap-keycloak-env.yaml
- deployment-keycloak.yaml
- service-keycloak-discovery.yaml
- service-keycloak-web.yaml

configMapGenerator:
- name: altcha-plugin
  files:
  - keycloak-altcha-jar-with-dependencies.jar
  - keycloak-rbac-provider.jar

generators:
- |-
  apiVersion: viaduct.ai/v1
  kind: ksops
  metadata:
    name: keycloak
    annotations:
      config.kubernetes.io/function: |
        exec:
          path: ksops
  files:
  - secret-postgres.enc.yaml
  - secret-keycloak-env.enc.yaml
