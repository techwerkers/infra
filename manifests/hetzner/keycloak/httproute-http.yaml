---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-http
spec:
  parentRefs:
  - group: gateway.networking.k8s.io 
    kind: Gateway
    name: keycloak
    sectionName: web
  hostnames:
  - id.techwerkers.nl
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        hostname: id.techwerkers.nl
        statusCode: 301
