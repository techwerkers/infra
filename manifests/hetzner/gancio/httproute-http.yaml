---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gancio-http
spec:
  parentRefs:
  - name: gancio
    sectionName: web
  hostnames:
  - events.techwerkers.nl
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        hostname: events.techwerkers.nl
        statusCode: 301
