---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n-public
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: n8n
  hostnames:
  - n8n.infra.techwerkers.nl
  rules:
  # webhooks
  - matches:
    - path:
        type: PathPrefix
        value: /webhook-test/
    - path:
        type: PathPrefix
        value: /webhook/
    backendRefs:
    - group: ""
      kind: Service
      name: n8n
      port: 8080
      weight: 1
  # n8n
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - group: ""
      kind: Service
      name: n8n
      port: 8080
      weight: 1
    filters:
    - type: ExtensionRef
      extensionRef:
        group: traefik.io
        kind: Middleware
        name: n8n-req-headers
