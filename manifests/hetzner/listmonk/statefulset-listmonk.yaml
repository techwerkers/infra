---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: listmonk-listmonk
spec:
  selector:
    matchLabels:
      app: listmonk-listmonk
  serviceName: listmonk-listmonk
  replicas: 1
  template:
    metadata:
      labels:
        app: listmonk-listmonk
    spec:
      containers:
      - name: listmonk
        image: listmonk/listmonk:latest # Overridden
        command:
        - "sh"
        - "-c"
        - |
          ./listmonk --install --idempotent --yes --config /listmonk/config.toml && \
          ./listmonk --upgrade --yes --config /listmonk/config.toml && \
          ./listmonk --config /listmonk/config.toml
        envFrom:
        - configMapRef:
            name: listmonk-listmonk-env
        - secretRef:
            name: listmonk-listmonk
        ports:
        - containerPort: 9000
          name: http
        volumeMounts:
        - mountPath: /listmonk/uploads
          name: listmonk-data
        - mountPath: /listmonk/config.toml
          name: listmonk-config-toml
          subPath: config.toml
        resources:
          requests:
            memory: 128Mi
          limits:
            memory: 128Mi
      volumes:
      - name: listmonk-config-toml
        configMap:
          name: listmonk-config-toml
  volumeClaimTemplates:
  - metadata:
      name: listmonk-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: local-path
      resources:
        requests:
          storage: 2Gi
