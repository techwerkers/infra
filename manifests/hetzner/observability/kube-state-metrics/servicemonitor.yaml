apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-state-metrics
  labels:
    prometheus: scrape
spec:
  jobLabel: kube-state-metrics
  endpoints:
  - port: http-metrics
    metricRelabelings:
    - targetLabel: cluster
      replacement: hetzner-01
      action: replace
    honorLabels: true
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
