---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tw-matrix
spec:
  parentRefs:
  - name: tw-matrix
  hostnames:
  - chat.techwerkers.nl 
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: tw-matrix-tuwunel
      port: 8008
      weight: 1
